# Default architectural gate thresholds.
#
# Phase relevance:
#   scope_min and blast_ratio_min are only enforced in Phase B (agent evaluation).
#   In Phase A (human PR validation) they are always 1.0 regardless of threshold.
#   api_surface_min, max_new_dependencies, max_dead_code are enforced in both phases.
#
# All thresholds are conjunctive — failing any one fails the gate.
#
# To override for a specific task, copy this block into your task YAML and adjust values.
# override_justification is required when any value differs from these defaults.
#
# Example override for a refactoring task (legitimately touches more files/LOC):
#   architectural:
#     thresholds:
#       scope_min: 0.5
#       blast_ratio_min: 0.3
#       override_justification: "Refactor task — agent expected to touch more files than creator reference"

architectural:
  thresholds:
    scope_min: 0.7            # Phase B: agent files must overlap >= 70% with creator scope
    blast_ratio_min: 0.5      # Phase B: agent LOC must be <= 2x creator LOC
    api_surface_min: 1.0      # Both:    zero breaking public API changes
    max_new_dependencies: 0   # Both:    no new external packages
    max_dead_code: 2          # Both:    at most 2 distinct dead-code linter rule codes
  allow_new_dependencies: false
  allow_api_breaks: false
